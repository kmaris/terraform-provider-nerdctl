name: Acceptance

# Runs the TF_ACC suite against real containerd on the runner itself, in
# both rootless and rootful modes, each against the oldest supported
# nerdctl and the latest release. Test objects live in the tfacc
# containerd namespace with randomized names; everything is throwaway.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rootless:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # The floor for the suite is nerdctl 2.3 (nerdctl_registry_image
        # needs `manifest inspect`), but the pin is v2.3.2: the v2.3.0/1
        # nerdctl-full tarballs bundle containerd v2.3.0-beta.2, whose
        # inspect flaked with empty State right after run/restart.
        # latest resolves at install time to catch upstream breakage
        # before it reaches users; a red latest cell with a green
        # pinned cell means nerdctl changed, not this provider.
        nerdctl: [v2.3.2, latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install nerdctl-full
        run: |
          TAG='${{ matrix.nerdctl }}'
          if [ "$TAG" = latest ]; then
            TAG=$(curl -fsSL https://api.github.com/repos/containerd/nerdctl/releases/latest | jq -r .tag_name)
          fi
          VER=${TAG#v}
          echo "installing nerdctl-full ${VER}"
          curl -fsSL -o /tmp/nerdctl-full.tgz \
            "https://github.com/containerd/nerdctl/releases/download/${TAG}/nerdctl-full-${VER}-linux-amd64.tar.gz"
          sudo tar Cxzf /usr/local /tmp/nerdctl-full.tgz

      # Mirrors the "Preparing a rootless containerd host" guide.
      - name: Set up rootless containerd
        run: |
          sudo apt-get update
          sudo apt-get install -y uidmap dbus-user-session

          # Ubuntu 24.04 restricts unprivileged user namespaces by default,
          # which blocks rootlesskit.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

          # cgroup v2 delegation so the memory/cpus tests work (guide step 4).
          sudo mkdir -p /etc/systemd/system/user@.service.d
          printf '[Service]\nDelegate=cpu cpuset io memory pids\n' \
            | sudo tee /etc/systemd/system/user@.service.d/delegate.conf
          sudo systemctl daemon-reload

          # Lingering user manager (guide step 2). Runner steps are not
          # login sessions, so point at the user bus explicitly.
          sudo loginctl enable-linger "$(id -un)"
          sudo systemctl start "user@$(id -u).service"
          echo "XDG_RUNTIME_DIR=/run/user/$(id -u)" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus" >> "$GITHUB_ENV"

      - name: Start rootless containerd
        run: |
          containerd-rootless-setuptool.sh install
          systemctl --user is-active containerd.service
          nerdctl info >/dev/null
          echo READY

      # buildkitd for the nerdctl_image build tests.
      - name: Start rootless buildkit
        run: |
          containerd-rootless-setuptool.sh install-buildkit
          systemctl --user is-active buildkit.service

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          NERDCTL_TEST_HOST: ""
        run: go test -v -count=1 -run TestAcc ./internal/provider/ -timeout 20m

  rootful:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Same two-cell version matrix as the rootless job.
        nerdctl: [v2.3.2, latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install nerdctl-full
        run: |
          TAG='${{ matrix.nerdctl }}'
          if [ "$TAG" = latest ]; then
            TAG=$(curl -fsSL https://api.github.com/repos/containerd/nerdctl/releases/latest | jq -r .tag_name)
          fi
          VER=${TAG#v}
          echo "installing nerdctl-full ${VER}"
          curl -fsSL -o /tmp/nerdctl-full.tgz \
            "https://github.com/containerd/nerdctl/releases/download/${TAG}/nerdctl-full-${VER}-linux-amd64.tar.gz"
          sudo tar Cxzf /usr/local /tmp/nerdctl-full.tgz

      - name: Start bundled containerd
        # The runner's preinstalled containerd (Docker's, 1.7-era) cannot
        # spawn the 2.x shim that nerdctl-full puts in /usr/local/bin —
        # the daemon and shim must come from the same release. Swap the
        # runner's daemon for the bundled one (its unit ships in the
        # tarball at /usr/local/lib/systemd/system, which precedes
        # /usr/lib in the systemd search path).
        run: |
          sudo systemctl disable --now docker.service docker.socket containerd.service || true
          sudo systemctl daemon-reload
          sudo systemctl enable --now containerd.service
          systemctl show -p FragmentPath containerd.service   # expect /usr/local/lib/...
          sudo /usr/local/bin/ctr version
          sudo /usr/local/bin/nerdctl info >/dev/null
          echo READY

      # buildkitd for the nerdctl_image build tests. Its unit ships in the
      # nerdctl-full tarball next to containerd's.
      - name: Start bundled buildkit
        run: |
          sudo systemctl enable --now buildkit.service
          systemctl is-active buildkit.service

      - name: Run acceptance tests
        # The suite itself runs as root so local nerdctl calls are rootful.
        run: |
          sudo -E env "PATH=$PATH" TF_ACC=1 NERDCTL_TEST_HOST= \
            go test -v -count=1 -run TestAcc ./internal/provider/ -timeout 20m
